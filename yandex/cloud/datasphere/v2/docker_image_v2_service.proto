syntax = "proto3";

package yandex.cloud.datasphere.v2;

import "yandex/cloud/api/operation.proto";
import "yandex/cloud/operation/operation.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/datasphere/v2;datasphere";
option java_outer_classname = "DSDIS";
option java_package = "yandex.cloud.api.datasphere.v2";

// A set of methods for managing Docker Images v2.
service DockerImageV2Service {
  // Activates available docker image v2 in project
  rpc SetActive(SetActiveRequest) returns (operation.Operation) {
    option (api.operation) = {
      response: "google.protobuf.Empty"
    };
  };

}

message SetActiveRequest {
  // Id of Docker Image V2
  string image_id = 1 [
    (length) = "<=50",
    (required) = true
  ];

  // Id of Project
  string project_id = 2 [
    (length) = "<=50",
    (required) = true
  ];
}
