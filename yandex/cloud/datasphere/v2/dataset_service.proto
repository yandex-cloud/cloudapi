syntax = "proto3";

package yandex.cloud.datasphere.v2;

import "google/api/annotations.proto";
import "yandex/cloud/api/operation.proto";
import "yandex/cloud/operation/operation.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/datasphere/v2;datasphere";
option java_package = "yandex.cloud.api.datasphere.v2";

// A set of methods for managing Datasets.
service DatasetService {
  // Activates shared dataset for project
  rpc Activate(ActivateDatasetRequest) returns (operation.Operation) {
    option (api.operation) = {
      response: "google.protobuf.Empty"
    };
    option (google.api.http) = {
      body: "*"
      post: "/datasphere/v2/dataset/activate"
    };
  };

  // Deactivates shared dataset for project
  rpc Deactivate(DeactivateDatasetRequest) returns (operation.Operation) {
    option (api.operation) = {
      response: "google.protobuf.Empty"
    };
    option (google.api.http) = {
      body: "*"
      post: "/datasphere/v2/dataset/deactivate"
    };
  };

}

message ActivateDatasetRequest {
  string dataset_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
  string project_id = 2 [
    (length) = "<=50",
    (required) = true
  ];
}

message DeactivateDatasetRequest {
  string dataset_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
  string project_id = 2 [
    (length) = "<=50",
    (required) = true
  ];
}
