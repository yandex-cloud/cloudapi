syntax = "proto3";

package yandex.cloud.cic.v1;

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/cic/v1;cic";
option java_package = "yandex.cloud.api.cic.v1";

// A Partner resource.
message Partner {
  reserved 2 to 6, 10;

  // ID of the partner.
  string id = 1;

  // Name of the partner.
  string name = 7;

  // Link to info about the partner.
  string url = 8;

  // List of pointOfPresence IDs that the partner is connected to.
  repeated string pop_ids = 9;

  // Status of the partner.
  Status status = 11;
  enum Status {
    // Status is unspecified.
    STATUS_UNSPECIFIED = 0;

    // Partner is up and operational.
    UP = 1;

    // Partner is down and not operational.
    DOWN = 2;
  }
}
