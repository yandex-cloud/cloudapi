syntax = "proto3";

package yandex.cloud.cic.v1;

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/cic/v1;cic";
option java_package = "yandex.cloud.api.cic.v1";

// A PointOfPresence resource.
message PointOfPresence {
  reserved 2 to 7;

  // ID of the pointOfPresence.
  string id = 1;

  // Name of the pointOfPresence.
  string name = 8;

  // Location address of the pointOfPresence.
  string location_address = 9;

  // Links to info about the connection points.
  repeated string connection_points = 10;
}
