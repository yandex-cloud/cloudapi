syntax = "proto3";

package yandex.cloud.cic.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "yandex/cloud/cic/v1/common/lag_allocation_settings.proto";
import "yandex/cloud/cic/v1/common/transceiver_type.proto";
import "yandex/cloud/cic/v1/trunk_connection.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/cic/v1;cic";
option java_package = "yandex.cloud.api.cic.v1";

// A client-opened ticket for creating a TrunkConnection through the support team.
message TrunkConnectionTicket {
  reserved 4 to 5;

  enum Status {
    STATUS_UNSPECIFIED = 0;

    // Waiting for the support team to approve/reject, or for the client to revoke.
    STATUS_PENDING_SUPPORT = 1;

    // Approved by the support team.
    STATUS_APPROVED = 2;

    // Rejected by the support team.
    STATUS_REJECTED = 3;

    // Revoked by the client.
    STATUS_REVOKED = 4;

    // Automatically expired by TTL.
    STATUS_EXPIRED = 5;
  }

  // ID of the ticket.
  string id = 1;

  // Current status of the ticket.
  Status status = 2;

  // ID of the folder where the future TrunkConnection should be placed.
  string folder_id = 3;

  // ID of the IAM subject who created the ticket.
  string subject_id = 6;

  // ID of the support ticket opened for this request.
  string support_ticket_id = 7;

  // ID of the actually created TrunkConnection. Populated after Approve.
  string trunk_connection_id = 8;

  // Snapshot of the form fields submitted by the client.
  TrunkConnectionTicketSpec spec = 9;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 10;

  // Last update timestamp.
  google.protobuf.Timestamp updated_at = 11;

  // Time at which the ticket will be automatically expired.
  google.protobuf.Timestamp expired_at = 12;
}

message TrunkConnectionTicketSpec {
  message SinglePortDirectJoint {
    // Type of transceiver that the trunkConnection is deployed on.
    common.TransceiverType transceiver_type = 1 [(required) = true];
  }

  message LagDirectJoint {
    // Type of transceiver that the trunkConnection is deployed on.
    common.TransceiverType transceiver_type = 1 [(required) = true];

    // LAG allocation settings that the trunkConnection is deployed on.
    common.LagAllocationSettingsRequest lag_allocation_settings = 2 [(required) = true];
  }

  message PartnerJoint {
    // ID of the partner that the trunkConnection is deployed on.
    google.protobuf.StringValue partner_id = 1 [(required) = true];
  }

  // Name of the future TrunkConnection. Must be unique within the folder.
  string name = 1 [(pattern) = "[a-zA-Z]([-_a-zA-Z0-9]{0,61}[a-zA-Z0-9])?"];

  // Description of the future TrunkConnection.
  string description = 2 [(length) = "<=256"];

  // Desired capacity of the TrunkConnection.
  TrunkConnection.Capacity capacity = 3 [(required) = true];

  // ID of the desired PointOfPresence.
  google.protobuf.StringValue point_of_presence_id = 4 [(required) = true];

  // Free-form message from the client to the support team.
  string user_message = 5 [(length) = "<=2000"];

  // Resource labels as `key:value` pairs.
  map<string, string> labels = 6 [
    (length) = "<=63",
    (map_key) = {
      length: "1-63"
      pattern: "[a-z][-_0-9a-z]*"
    },
    (pattern) = "[-_0-9a-z]*",
    (size) = "<=64"
  ];

  // Deletion protection flag for the future TrunkConnection.
  bool deletion_protection = 7;
}
