syntax = "proto3";

package yandex.cloud.serverless.mdbproxy.v1;

import "google/protobuf/timestamp.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/serverless/mdbproxy/v1;proxy";
option java_package = "yandex.cloud.api.serverless.mdbproxy.v1";

message Proxy {
  // ID of the proxy.
  string id = 1;

  // ID of the folder that the proxy belongs to.
  string folder_id = 2 [
    (length) = "<=50",
    (required) = true
  ];

  // Creation timestamp for the proxy.
  google.protobuf.Timestamp created_at = 3;

  // Name of the proxy.
  string name = 4 [
    (pattern) = "|[a-z][-a-z0-9]{1,61}[a-z0-9]",
    (required) = true
  ];

  // Description of the proxy.
  string description = 5;

  // Resource labels as `key:value` pairs.
  map<string, string> labels = 6 [
    (length) = "<=63",
    (map_key) = {
      length: "1-63"
      pattern: "[a-z][-_./\\@0-9a-z]*"
    },
    (pattern) = "[-_./\\@0-9a-z]*",
    (size) = "<=64"
  ];

  // MDB specific settings.
  Target target = 7;
}

message Target {
  oneof mdb {
    option (exactly_one) = true;

    // Clickhouse settings for proxy.
    ClickHouse clickhouse = 1;

    // PostgreSQL settings for proxy.
    PostgreSQL postgresql = 2;
  }

  message ClickHouse {
    // Cluster identifier for clickhouse.
    string cluster_id = 1 [
      (length) = "<=50",
      (required) = true
    ];

    // Clickhouse user.
    string user = 2 [
      (length) = "<=63",
      (pattern) = "[a-zA-Z0-9_]*",
      (required) = true
    ];

    // Clickhouse password, input only field.
    string password = 3;

    // Clickhouse database name.
    string db = 4 [
      (length) = "<=63",
      (pattern) = "[a-zA-Z0-9_-]*",
      (required) = true
    ];

    // Clickhouse proxy-host for connection, output only field.
    string endpoint = 5;
  }

  message PostgreSQL {
    // Cluster identifier for postgresql.
    string cluster_id = 1 [
      (length) = "<=50",
      (required) = true
    ];

    // PostgreSQL user.
    string user = 2 [
      (length) = "<=63",
      (pattern) = "[a-zA-Z0-9_-]*",
      (required) = true
    ];

    // PostgreSQL password, input only field.
    string password = 3;

    // PostgreSQL database name.
    string db = 4 [
      (length) = "<=63",
      (pattern) = "[a-zA-Z0-9_-]*",
      (required) = true
    ];

    // PostgreSQL proxy-host for connection, output only field.
    string endpoint = 5;
  }
}
