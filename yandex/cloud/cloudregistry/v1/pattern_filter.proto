syntax = "proto3";

package yandex.cloud.cloudregistry.v1;

import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/cloudregistry/v1;cloudregistry";
option java_package = "yandex.cloud.api.cloudregistry.v1";

// Default filter includes all artifacts ("**") and excludes none.
message PatternFilter {
  // List of patterns for artifacts to include.
  repeated string include_patterns = 1 [(pattern) = "[A-Za-z0-9._~:@!$&+\\-?*/]+"];

  // List of patterns for artifacts to exclude.
  repeated string exclude_patterns = 2 [(pattern) = "[A-Za-z0-9._~:@!$&+\\-?*/]+"];
}
