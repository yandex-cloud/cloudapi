syntax = "proto3";

package yandex.cloud.cloudregistry.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "yandex/cloud/api/operation.proto";
import "yandex/cloud/cloudregistry/v1/lifecycle_policy.proto";
import "yandex/cloud/operation/operation.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/cloudregistry/v1;cloudregistry";
option java_package = "yandex.cloud.api.cloudregistry.v1";

// A set of methods for managing LifecyclePolicy resources.
service LifecyclePolicyService {
  // Creates a lifecycle policy in the specified registry.
  rpc Create(CreateLifecyclePolicyRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "CreateLifecyclePolicyMetadata"
      response: "LifecyclePolicy"
    };
    option (google.api.http) = {
      body: "*"
      post: "/cloud-registry/v1/lifecyclePolicies"
    };
  };

  // Updates the specified lifecycle policy.
  rpc Update(UpdateLifecyclePolicyRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "UpdateLifecyclePolicyMetadata"
      response: "LifecyclePolicy"
    };
    option (google.api.http) = {
      body: "*"
      patch: "/cloud-registry/v1/lifecyclePolicies/{policy_id}"
    };
  };

  // Deletes the specified lifecycle policy.
  rpc Delete(DeleteLifecyclePolicyRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "DeleteLifecyclePolicyMetadata"
      response: "google.protobuf.Empty"
    };
    option (google.api.http) = {
      delete: "/cloud-registry/v1/lifecyclePolicies/{policy_id}"
    };
  };

  // Returns the specified lifecycle policy.
  rpc Get(GetLifecyclePolicyRequest) returns (LifecyclePolicy) {
    option (google.api.http) = {
      get: "/cloud-registry/v1/lifecyclePolicies/{policy_id}"
    };
  };

  // Retrieves the list of lifecycle policies in the specified registry.
  rpc List(ListLifecyclePolicyRequest) returns (ListLifecyclePolicyResponse) {
    option (google.api.http) = {
      get: "/cloud-registry/v1/lifecyclePolicies"
    };
  };

  // Changes the state of the specified lifecycle policy.
  rpc ChangeState(ChangeLifecyclePolicyStateRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      body: "*"
      post: "/cloud-registry/v1/lifecyclePolicies/{policy_id}:changeState"
    };
  };

  // Creates a request of a dry run of the lifecycle policy.
  rpc DryRun(DryRunLifecyclePolicyRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "DryRunLifecyclePolicyMetadata"
      response: "DryRunLifecyclePolicyResponse"
    };
    option (google.api.http) = {
      body: "*"
      post: "/cloud-registry/v1/lifecyclePolicies/{policy_id}:dryRun"
    };
  };

  // Returns one dry run result by its ID.
  rpc GetDryRunResult(GetDryRunLifecyclePolicyResultRequest) returns (DryRunLifecyclePolicyResponse) {
    option (google.api.http) = {
      get: "/cloud-registry/v1/lifecyclePolicyDryRunResults/{dry_run_id}"
    };
  };

  // Returns the list of dry run results of one lifecycle policy.
  rpc ListDryRunResults(ListDryRunLifecyclePolicyResultsRequest) returns (ListDryRunLifecyclePolicyResultsResponse) {
    option (google.api.http) = {
      get: "/cloud-registry/v1/lifecyclePolicyDryRunResults"
    };
  };

  // Returns the list of artifacts that the dry run would delete.
  rpc ListDryRunArtifacts(ListDryRunLifecyclePolicyArtifactsRequest) returns (ListDryRunLifecyclePolicyArtifactsResponse) {
    option (google.api.http) = {
      get: "/cloud-registry/v1/lifecyclePolicyDryRunResults/{dry_run_id}:artifacts"
    };
  };
}

message CreateLifecyclePolicyRequest {
  // ID of the registry to create a lifecycle policy in.
  string registry_id = 1 [
    (length) = "<=50",
    (required) = true
  ];

  // Name of the lifecycle policy.
  string name = 2 [(pattern) = "|[a-z][-a-z0-9]{1,61}[a-z0-9]"];

  // Description of the lifecycle policy. 0-1024 characters long.
  string description = 3 [(length) = "<=1024"];

  // List of lifecycle rules.
  repeated LifecycleRule rules = 4;

  // Initial state of the lifecycle policy.
  LifecyclePolicyState state = 5;
}

message CreateLifecyclePolicyMetadata {
  // ID of the lifecycle policy that is being created.
  string policy_id = 1;
}

message UpdateLifecyclePolicyRequest {
  // ID of the lifecycle policy to update.
  string policy_id = 1 [
    (length) = "<=50",
    (required) = true
  ];

  // Field mask that specifies which fields of the lifecycle policy are going to be updated.
  google.protobuf.FieldMask update_mask = 2;

  // Name of the lifecycle policy.
  string name = 3 [(pattern) = "|[a-z][-a-z0-9]{1,61}[a-z0-9]"];

  // Description of the lifecycle policy. 0-1024 characters long.
  string description = 4 [(length) = "<=1024"];

  // List of lifecycle rules.
  repeated LifecycleRule rules = 5;

  // State of the lifecycle policy.
  LifecyclePolicyState state = 6;
}

message UpdateLifecyclePolicyMetadata {
  // ID of the lifecycle policy that is being updated.
  string policy_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

message DeleteLifecyclePolicyRequest {
  // ID of the lifecycle policy to delete.
  string policy_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

message DeleteLifecyclePolicyMetadata {
  // ID of the lifecycle policy that is being deleted.
  string policy_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

message GetLifecyclePolicyRequest {
  // ID of the lifecycle policy to return.
  string policy_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

message ListLifecyclePolicyRequest {
  // ID of the registry to list lifecycle policies in.
  string registry_id = 1 [(length) = "<=50"];

  // The maximum number of results per page to return.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token. To get the next page of results, set page_token to the
  // ListLifecyclePolicyResponse.next_page_token returned by a previous list request.
  string page_token = 3 [(length) = "<=100"];
}

message ListLifecyclePolicyResponse {
  // List of lifecycle policy resources.
  repeated LifecyclePolicy policies = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message ChangeLifecyclePolicyStateRequest {
  // ID of the lifecycle policy to change state.
  string policy_id = 1 [
    (length) = "<=50",
    (required) = true
  ];

  // Target state of the lifecycle policy.
  LifecyclePolicyState state = 2 [(required) = true];
}

message DryRunLifecyclePolicyRequest {
  // ID of the lifecycle policy.
  string policy_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

message DryRunLifecyclePolicyMetadata {
  // ID of the lifecycle policy.
  string policy_id = 1;
}

message DryRunLifecyclePolicyResponse {
  // ID of the lifecycle policy.
  string policy_id = 1;

  // Time when the dry run started.
  google.protobuf.Timestamp run_at = 2;

  // Count of artifacts to be hard deleted.
  int64 artifacts_to_hard_delete_count = 3;

  // Count of artifacts to be soft deleted.
  int64 artifacts_to_soft_delete_count = 4;

  // ID of this dry run. Use it to get this result again later.
  string dry_run_id = 5;

  // Copy of the policy rules at the time of the dry run.
  repeated LifecycleRule policy_snapshot = 6;
}

message GetDryRunLifecyclePolicyResultRequest {
  // ID of the dry run.
  string dry_run_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

message ListDryRunLifecyclePolicyResultsRequest {
  // ID of the lifecycle policy.
  string policy_id = 1 [
    (length) = "<=50",
    (required) = true
  ];

  // The maximum number of results per page to return.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token. To get the next page of results, set page_token to the
  // ListDryRunLifecyclePolicyResultsResponse.next_page_token returned by a previous list request.
  string page_token = 3 [(length) = "<=1000"];

  // Return dry run results run at this time or later.
  google.protobuf.Timestamp run_after = 4;

  // Return dry run results run before this time.
  google.protobuf.Timestamp run_before = 5;

  // Sort order. Comma-separated "field [asc|desc]", e.g. "run_at desc".
  // Valid fields: run_at.
  // Defaults to "run_at desc" when empty.
  string order_by = 6 [(length) = "<=256"];
}

message ListDryRunLifecyclePolicyResultsResponse {
  // List of dry run results.
  repeated DryRunLifecyclePolicyResponse results = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

message ListDryRunLifecyclePolicyArtifactsRequest {
  // ID of the dry run.
  string dry_run_id = 1 [
    (length) = "<=50",
    (required) = true
  ];

  // The maximum number of results per page to return.
  int64 page_size = 2 [(value) = "<=1000"];

  // Page token. To get the next page of results, set page_token to the
  // ListDryRunLifecyclePolicyArtifactsResponse.next_page_token returned by a previous list request.
  string page_token = 3 [(length) = "<=1000"];

  // Filter by artifact path.
  // The expression must specify:
  // 1. The field path
  // 2. An operator: =, !=.
  // 3. The value in double quotes.
  // Examples:
  // path = "pool/main/all"
  // path != "pool/main/all"
  // No regular expressions allowed.
  string path_filter = 4 [(length) = "<=1000"];

  // Filter by artifact version.
  // The expression must specify:
  // 1. The field version
  // 2. An operator: =, !=.
  // 3. The value in double quotes.
  // Examples:
  // version = "latest"
  // version != "latest"
  // No regular expressions allowed.
  string version_filter = 5 [(length) = "<=1000"];

  // Sort order. Comma-separated "field [asc|desc]", e.g. "path desc".
  // Valid fields: path.
  // Defaults to "path asc" when empty.
  string order_by = 6 [(length) = "<=256"];
}

message ListDryRunLifecyclePolicyArtifactsResponse {
  // List of artifacts that the dry run would delete.
  repeated AffectedArtifact artifacts = 1;

  // This token allows you to get the next page of results for list requests.
  string next_page_token = 2;
}

// One artifact that a dry run would delete.
message AffectedArtifact {
  // Full path of the artifact, for example /library/ubuntu/latest.
  string path = 1;

  // Version of the artifact. The backend does not store it.
  // The backend takes the part of the path after the last "/", for example latest.
  string version = 2;

  // ID of the artifact.
  string artifact_id = 3;

  // Rule that would delete this artifact.
  TriggeredRule affected_by = 4;
  // Rule that matched the artifact during the dry run.
  message TriggeredRule {
    // Type of the rule that matched.
    LifecycleRuleType rule_type = 1;

    // Index of the rule in the policy rules snapshot (policy_snapshot) of this dry run.
    int64 rule_index = 2;
  }
}
