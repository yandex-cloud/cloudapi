syntax = "proto3";

package yandex.cloud.cloudregistry.v1;

import "yandex/cloud/api/operation.proto";
import "yandex/cloud/operation/operation.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/cloudregistry/v1;cloudregistry";
option java_package = "yandex.cloud.api.cloudregistry.v1";

// A set of methods for managing cloud migration.
service MigrationService {
  // Starts migration for all registries in the specified cloud.
  rpc StartCloud(StartCloudMigrationRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "StartCloudMigrationMetadata"
      response: "google.protobuf.Empty"
    };
  };

}

// Request for starting migration for all registries in the specified cloud.
message StartCloudMigrationRequest {
  // ID of the cloud.
  string cloud_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

// Metadata for cloud migration operation.
message StartCloudMigrationMetadata {
  // ID of the cloud.
  string cloud_id = 1;

  // IDs of registries selected for migration.
  repeated string registry_ids = 2;
}
