syntax = "proto3";

package yandex.cloud.cloudregistry.v1;

import "google/protobuf/timestamp.proto";
import "yandex/cloud/cloudregistry/v1/docker_content.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/cloudregistry/v1;cloudregistry";
option java_package = "yandex.cloud.api.cloudregistry.v1";

// A Artifact resource.
message Artifact {
  enum Kind {
    KIND_UNSPECIFIED = 0;

    // Artifact kind is folder.
    FOLDER = 1;

    // Artifact kind is package.
    PACKAGE = 2;

    // Artifact kind is artifact.
    ARTIFACT = 3;
  }

  enum Status {
    STATUS_UNSPECIFIED = 0;

    // Artifact status is being created.
    CREATING = 1;

    // Artifact status is ready to use.
    ACTIVE = 2;

    // Artifact status is being deleted.
    DELETING = 3;
  }

  // Output only. ID of the artifact.
  string id = 1;

  // Path where the artifact is located.
  string path = 2;

  // Name of the artifact.
  string name = 3;

  // Kind of the artifact.
  Kind kind = 4;

  // Output only. Status of the artifact.
  Status status = 5;

  // Output only. Creation timestamp in [RFC3339](https://www.ietf.org/rfc/rfc3339.txt) text format.
  google.protobuf.Timestamp created_at = 6;

  // Output only. ID of the user or service account who created the artifact.
  string created_by = 8;

  // Output only. Modification timestamp in [RFC3339](https://www.ietf.org/rfc/rfc3339.txt) text format.
  google.protobuf.Timestamp modified_at = 7;

  // Output only. ID of the user or service account who last modified the artifact.
  string modified_by = 9;

  // Key-value properties associated with the artifact.
  map<string, string> properties = 10;

  // Content of the artifact.
  Content content = 11;
}

// Content of the artifact, specific to its type.
message Content {
  oneof spec {
    // Docker-specific content.
    DockerContent docker = 1;
  }
}
