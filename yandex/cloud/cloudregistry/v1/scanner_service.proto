syntax = "proto3";

package yandex.cloud.cloudregistry.v1;

import "yandex/cloud/api/operation.proto";
import "yandex/cloud/cloudregistry/v1/scanner.proto";
import "yandex/cloud/operation/operation.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/cloudregistry/v1;cloudregistry";
option java_package = "yandex.cloud.api.cloudregistry.v1";

// A set of methods for scanning artifacts.
service ScannerService {
  // Executes scanning of specified artifact.
  rpc Scan(ScanRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "ScanMetadata"
      response: "ScanResult"
    };
  };

  // Returns the specified ScanResult resource.
  // To get the list of ScanResults for specified artifact, make a [List] request.
  rpc Get(GetScanResultRequest) returns (ScanResult);

  // Returns the last finished ScanResult for the specified artifact.
  rpc GetLast(GetLastScanResultRequest) returns (ScanResult);

  // Retrieves the list of ScanResults for specified artifact.
  rpc List(ListScanResultsRequest) returns (ListScanResultsResponse);

  // Retrieves the list of vulnerabilities found in particular scan.
  rpc ListVulnerabilities(ListVulnerabilitiesRequest) returns (ListVulnerabilitiesResponse);
}

message ScanRequest {
  // ID of the artifact to be scanned for vulnerabilities.
  string artifact_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

message ScanMetadata {
  // ID of the ScanResult that is being created.
  string artifact_id = 1;
}

message GetScanResultRequest {
  // ID of the ScanResult to return.
  string scan_result_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

message GetLastScanResultRequest {
  // ID of the artifact to get last finished ScanResult.
  string artifact_id = 1 [(length) = "<=50"];
}

message ListScanResultsRequest {
  // ID of the artifact to list ScanResults for.
  string artifact_id = 1 [(length) = "<=50"];

  // The maximum number of results per page to return. If the number of available
  // results is larger than [page_size],
  // the service returns a [ListScanResultsResponse.next_page_token]
  // that can be used to get the next page of results in subsequent list requests.
  // Default value: 10.
  int64 page_size = 2 [(value) = "0-1000"];

  // Page token. To get the next page of results, set [page_token] to the
  // [ListScanResultsResponse.next_page_token] returned by a previous list request.
  string page_token = 3 [(length) = "<=100"];

  // Filter the list by [ScanResult.status].
  ListScanResultsFilter filter = 4;

  // An order expression that orders resources listed in the response.
  // The expression must specify:
  // 1. The field name. Currently you can use filtering only on [ScanResult.status] field.
  // 2. Order selector. Currently you can use ordering only on `ScanResult.status` field (critical first).
  string order_by = 5 [(length) = "<=100"];
}

message ListScanResultsFilter {
  // Filter by the `ScanResult.status` value.
  ScanResult.Status status = 1;
}

message ListScanResultsResponse {
  // List of ScanResult resources.
  repeated ScanResult scan_results = 1;

  // This token allows you to get the next page of results for list requests. If the number of results
  // is larger than [ListScanResultsRequest.page_size], use
  // the [next_page_token] as the value
  // for the [ListScanResultsRequest.page_token] query parameter
  // in the next list request. Each subsequent list request will have its own
  // [next_page_token] to continue paging through the results.
  string next_page_token = 2;
}

message ListVulnerabilitiesRequest {
  // ID of the ScanResult to get list of vulnerabilities for.
  string scan_result_id = 1 [
    (length) = "<=50",
    (required) = true
  ];

  // The maximum number of results per page to return. If the number of available
  // results is larger than [page_size],
  // the service returns a [ListVulnerabilitiesResponse.next_page_token]
  // that can be used to get the next page of results in subsequent list requests.
  // Default value: 10.
  int64 page_size = 2 [(value) = "0-1000"];

  // Page token. To get the next page of results, set [page_token] to the
  // [ListVulnerabilitiesResponse.next_page_token] returned by a previous list request.
  string page_token = 3 [(length) = "<=100"];

  // Filter the list by [Vulnerability.severity] and [Vulnerability.name].
  ListVulnerabilitiesFilter filter = 4;

  // An order expression that orders resources listed in the response.
  // The expression must specify:
  // 1. The field name. Currently you can use filtering only on [Vulnerability.severity] and [Vulnerability.name] fields.
  // 2. Order selector. Currently you can use ordering only on `Vulnerability.severity` field (recent first).
  string order_by = 5 [(length) = "<=100"];
}

message ListVulnerabilitiesFilter {
  // Filter by the `Vulnerability.severity` value.
  Vulnerability.Severity severity = 1;

  // Filter by the `Vulnerability.name` value.
  string name = 2 [(length) = "<=100"];
}

message ListVulnerabilitiesResponse {
  // List of Vulnerability resources.
  repeated Vulnerability vulnerabilities = 1;

  // This token allows you to get the next page of results for list requests. If the number of results
  // is larger than [ListVulnerabilitiesRequest.page_size], use
  // the [next_page_token] as the value
  // for the [ListVulnerabilitiesRequest.page_token] query parameter
  // in the next list request. Each subsequent list request will have its own
  // [next_page_token] to continue paging through the results.
  string next_page_token = 2;
}
