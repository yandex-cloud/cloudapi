syntax = "proto3";

package yandex.cloud.mdb.postgresql.v1;

import "google/api/annotations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "yandex/cloud/mdb/postgresql/v1/managed_repack.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/mdb/postgresql/v1;postgresql";
option java_package = "yandex.cloud.api.mdb.postgresql.v1";

// A set of methods to manipulate with Repack in Postgresql cluster
service ManagedRepackService {
  // Lists currently running in given cluster Repacks
  // (-- api-linter: yc::1702::method-verb-prefix=disabled --)
  rpc ListRunningRepacks(ListRunningRepacksRequest) returns (ListRunningRepacksResponse) {
    option (google.api.http) = {
      get: "/managed-postgresql/v1/clusters/{cluster_id}:managedRepack_list_running"
    };
  };

  // Launches new Repack in given cluster
  // (-- api-linter: yc::1702::method-verb-prefix=disabled --)
  rpc LaunchRepack(LaunchRepackRequest) returns (LaunchRepackResponse) {
    option (google.api.http) = {
      body: "*"
      post: "/managed-postgresql/v1/clusters/{cluster_id}:managedRepack_launch"
    };
  };

  // Terminates currently running Repack in given cluster
  // (-- api-linter: yc::1702::method-verb-prefix=disabled --)
  rpc TerminateRepack(TerminateRepackRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      body: "*"
      post: "/managed-postgresql/v1/clusters/{cluster_id}:managedRepack_terminate"
    };
  };
}

// Request to list currently running Repacks in a cluster.
message ListRunningRepacksRequest {
  // Required. ID of the PostgreSQL cluster that Repack is running in.
  // To get the cluster ID use a [ClusterService.List] request.
  string cluster_id = 1 [
    (length) = "<=50",
    (required) = true
  ];
}

// Response with the list of currently running Repacks.
message ListRunningRepacksResponse {
  // List of RunningRepack.
  repeated RunningRepack repacks = 1;
}

// Request to terminate a running Repack in a cluster.
message TerminateRepackRequest {
  reserved 2;

  // Required. ID of the PostgreSQL cluster that Repack is running in.
  // To get the cluster ID use a [ClusterService.List] request.
  string cluster_id = 1 [
    (length) = "<=50",
    (required) = true
  ];

  // Launch ID of Repack process to terminate.
  // Use launch_id specified when launching Repack, or
  // use [ManagedRepackService.ListRunningRepacks] request to list currently running Repacks.
  string launch_id = 3;
}

// Request to launch a new Repack in a cluster.
message LaunchRepackRequest {
  // Required. ID of the PostgreSQL cluster that Repack is running in.
  // To get the cluster ID use a [ClusterService.List] request.
  string cluster_id = 1 [
    (length) = "<=50",
    (required) = true
  ];

  // Specification of repack to launch
  RepackSpec spec = 2 [(required) = true];

  // Initial timeout to tell finished immediately from running repacks
  // Defaults to 1 second, if not specified
  google.protobuf.Duration start_timeout = 3;

  // UUID of launch to be set by client
  string launch_id = 4;
}

// Result of a Repack launch.
message LaunchRepackResponse {
  // Outcome of the launch: finished immediately or still running.
  oneof result {
    // Returned if pg_repack finishes immediately before start_timeout expires
    FinishedRepack finished = 1;

    // Returned if pg_repack still runs after start_timeout expires
    RunningRepack running = 2;
  }
}
