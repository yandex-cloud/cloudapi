syntax = "proto3";

package yandex.cloud.mdb.v1;

import "google/protobuf/timestamp.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/mdb/v1;mdb";
option java_package = "yandex.cloud.api.mdb.v1";

// Message to describe a crontab schedule.
message CronTab {
  reserved 1 to 2;
  reserved "minute";
  reserved "hour";

  // Day of month in cron format. Valid values: 1-31, *, ranges (1-15), steps (*/2, 1-15/3), lists (1,15,28).
  // Defaults to "*".
  string day_of_month = 3;

  // Month in cron format. Valid values: 1-12, *, ranges (1-6), steps (*/3), lists (1,6,12).
  // Defaults to "*".
  string month = 4;

  // Day of week in cron format. Valid values: 0-7 (0 and 7 both mean Sunday), *, ranges (1-5), steps (0-6/2), lists (1,3,5).
  // Defaults to "*".
  string day_of_week = 5;
}

// Message to describe a retention policy for cluster backups.
message BackupRetentionPolicy {
  // Required. Policy ID.
  string policy_id = 1 [(required) = true];

  // Cluster ID.
  string cluster_id = 2 [
    (length) = "<=50",
    (required) = true
  ];

  // Required. Policy name.
  string policy_name = 3 [(required) = true];

  // Creation timestamp in [RFC3339](https://www.ietf.org/rfc/rfc3339.txt) text format.
  google.protobuf.Timestamp created_at = 4;

  // CronTab schedule.
  CronTab cron = 5;

  // Retention duration.
  int64 retain_for_days = 6;

  // Human-readable description.
  string description = 7;
}

// Message to describe a new retention policy for cluster backups.
message BackupRetentionPolicySpec {
  // Required. Policy name.
  string policy_name = 1 [(required) = true];

  // CronTab schedule.
  CronTab cron = 2;

  // Retention duration.
  int64 retain_for_days = 3;

  // Human-readable description.
  string description = 4;
}
