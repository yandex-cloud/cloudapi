syntax = "proto3";

package yandex.cloud.mdb.opensearch.v1;

import "google/api/annotations.proto";
import "yandex/cloud/mdb/v1/version.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/mdb/opensearch/v1;opensearch";
option java_package = "yandex.cloud.api.mdb.opensearch.v1";

service VersionsService {
  // Returns list of available OpenSearch versions.
  rpc List(ListVersionsRequest) returns (ListVersionsResponse) {
    option (google.api.http) = {
      get: "/managed-opensearch/v1/versions"
    };
  };
}

message ListVersionsRequest {
  // The maximum number of results per page that should be returned. If the number of available
  // results is larger than `page_size`, the service returns a `next_page_token` that can be used
  // to get the next page of results in subsequent ListVersions requests.
  // Acceptable values are 0 to 1000, inclusive. Default value: 100.
  int64 page_size = 1 [(value) = "0-1000"];

  // Page token. Set `page_token` to the `next_page_token` returned by a previous ListVersions
  // request to get the next page of results.
  string page_token = 2 [(length) = "<=100"];
}

message ListVersionsResponse {
  // Requested list of available versions.
  repeated yandex.cloud.mdb.v1.Version version = 1;

  // This token allows you to get the next page of results for ListVersions requests,
  // if the number of results is larger than `page_size` specified in the request.
  // To get the next page, specify the value of `next_page_token` as a value for
  // the `page_token` parameter in the next ListVersions request. Subsequent ListVersions
  // requests will have their own `next_page_token` to continue paging through the results.
  string next_page_token = 2;
}
