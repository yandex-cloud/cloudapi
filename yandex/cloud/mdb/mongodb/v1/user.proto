syntax = "proto3";

package yandex.cloud.mdb.mongodb.v1;

import "google/protobuf/wrappers.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/mdb/mongodb/v1;mongodb";
option java_package = "yandex.cloud.api.mdb.mongodb.v1";

// A MongoDB User resource. For more information, see the
// [Developer's Guide](/docs/managed-mongodb/concepts).
message User {
  reserved 4;

  // Name of the MongoDB user.
  string name = 1;

  // ID of the MongoDB cluster the user belongs to.
  string cluster_id = 2;

  // Set of permissions granted to the user.
  repeated Permission permissions = 3;

  // Authentication type for the user.
  AuthType auth_type = 5;

  // Deletion Protection inhibits deletion of the user
  google.protobuf.BoolValue deletion_protection = 6;
}

message Permission {
  // Name of the database that the permission grants access to.
  string database_name = 1;

  // MongoDB roles for the [database_name] database that the permission grants.
  repeated string roles = 2;
}

message UserSpec {
  reserved 4;

  // Name of the MongoDB user.
  string name = 1 [
    (length) = "<=63",
    (pattern) = "^[a-zA-Z0-9_][a-zA-Z0-9_@.-]*$",
    (required) = true
  ];

  // Password of the MongoDB user.
  string password = 2 [(length) = "<=128"];

  // Set of permissions to grant to the user.
  repeated Permission permissions = 3;

  // Authentication type for the user. Defaults to AUTH_TYPE_PASSWORD.
  AuthType auth_type = 5;

  // Deletion Protection inhibits deletion of the user
  google.protobuf.BoolValue deletion_protection = 6;
}

enum AuthType {
  AUTH_TYPE_UNSPECIFIED = 0;

  // Password-based authentication (SCRAM).
  AUTH_TYPE_PASSWORD = 1;

  // IAM-based authentication via iam-auth-proxy (SASL/PLAIN, $external).
  AUTH_TYPE_IAM = 2;
}
