syntax = "proto3";

package yandex.cloud.smartwebsecurity.v1.match_list;

import "google/protobuf/timestamp.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/smartwebsecurity/v1/match_list;smartwebsecurity";
option java_package = "yandex.cloud.api.smartwebsecurity.v1.match_list";

// A match list resource.
message MatchList {
  // Match list type.
  enum ListType {
    // Unspecified list type.
    LIST_TYPE_UNSPECIFIED = 0;

    // Managed list type.
    MANAGED = 1;

    // Custom list type.
    CUSTOM = 2;
  }

  // Match list item type
  enum ItemType {
    // Unspecified item type.
    ITEM_TYPE_UNSPECIFIED = 0;

    // IP list type.
    IP = 1;

    // Bot name list type.
    BOT_NAME = 2;

    // Bot category list type.
    BOT_CATEGORY = 3;

    // ASN list type.
    ASN = 4;

    // String list type.
    STR = 5;

    // Regular expression list type.
    REG_EXP = 6;
  }

  // Item
  message Item {
    // Value of the item.
    string value = 1 [
      (length) = "<=256",
      (required) = true
    ];

    // Description of the item.
    string description = 2 [(length) = "<=128"];
  }

  // ID of the match list.
  string id = 1;

  // ID of the folder that the match list belongs to.
  string folder_id = 2;

  // ID of the cloud that the match list belongs to.
  string cloud_id = 3;

  // Labels as `` key:value `` pairs. Maximum of 64 per resource.
  map<string, string> labels = 4 [
    (length) = "<=63",
    (map_key) = {
      length: "1-63"
      pattern: "[a-z][-_0-9a-z]*"
    },
    (pattern) = "[-_0-9a-z]*",
    (size) = "<=64"
  ];

  // Name of the match list.
  string name = 5 [
    (length) = "1-50",
    (pattern) = "[a-zA-Z0-9][a-zA-Z0-9-_.]*",
    (required) = true
  ];

  // Description of the match list.
  string description = 6 [(length) = "<=512"];

  // Match list type.
  ListType list_type = 7 [(required) = true];

  // Match list item type.
  ItemType item_type = 8 [(required) = true];

  // Match list items.
  repeated Item items = 9;

  // Creation timestamp in [RFC3339](https://www.ietf.org/rfc/rfc3339.txt) text format.
  google.protobuf.Timestamp created_at = 10;

  // Update timestamp in [RFC3339](https://www.ietf.org/rfc/rfc3339.txt) text format.
  google.protobuf.Timestamp updated_at = 11;
}
