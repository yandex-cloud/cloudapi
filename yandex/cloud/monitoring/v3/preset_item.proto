syntax = "proto3";

package yandex.cloud.monitoring.v3;

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/monitoring/v3;monitoring";
option java_package = "yandex.cloud.api.monitoring.v3";

// Selected infra event value
message InfraPresetValue {
  // Service ID
  string service_id = 1;
}

// Selected parameter value(s)
message ParameterPresetValue {
  // Parameter name (id)
  string parameter_name = 1;

  // Parameter value.
  repeated string value = 2;
}

// Selected logs overlay
message LogsOverlayPresetValue {
  // Overlay name
  string name = 1;
}

// Preset value
message PresetItem {
  // Title
  string title = 1;

  // Selected infra event values
  repeated InfraPresetValue infra_values = 2;

  // Is infra event values exist. Set the flag to true if you want to show that the value is []
  bool infra_values_exist = 5;

  // Selected dashboard parameter values
  repeated ParameterPresetValue parameter_values = 3;

  // Is parameter values exist. Set the flag to true if you want to show that the value is []
  bool parameter_values_exist = 6;

  // Selected logs overlay values
  repeated LogsOverlayPresetValue logs_overlay_values = 4;

  // Is logs overlay values exist. Set the flag to true if you want to show that the value is []
  bool logs_overlay_values_exist = 7;
}
