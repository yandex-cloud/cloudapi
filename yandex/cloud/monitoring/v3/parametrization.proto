syntax = "proto3";

package yandex.cloud.monitoring.v3;

import "yandex/cloud/monitoring/v3/unit_format.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/monitoring/v3;monitoring";
option java_package = "yandex.cloud.api.monitoring.v3";

// Label values parameter.
message LabelValuesParameter {
  reserved 3 to 18;
  // Container id
  oneof container {
    // Required. Folder ID.
    string folder_id = 2;
  }

  // Required. Selectors to select metric label values.
  string selectors = 19;

  // Required. Label key to list label values.
  string label_key = 20;

  // Specifies the multiselectable values of parameter.
  bool multiselectable = 21;

  // Default values.
  repeated string default_values = 22;
}

// Custom parameter.
message CustomParameter {
  // Required. List of parameter values.
  repeated string values = 1;

  // Specifies the multiselectable values of parameter.
  bool multiselectable = 2;

  // Default values.
  repeated string default_values = 3;
}

// Text parameter.
message TextParameter {
  // Default value.
  string default_value = 1;
}

// Double parameter.
message DoubleParameter {
  // Default value.
  double default_value = 1;

  // Parameter unit.
  UnitFormat unit_format = 2;
}

// Integer parameter.
message IntegerParameter {
  // Default value.
  int64 default_value = 1;

  // Parameter unit.
  UnitFormat unit_format = 2;
}

// Text multiple values parameter.
message TextValuesParameter {
  // Default value.
  repeated string default_values = 1;
}

// Workspace parameter.
message WorkspaceParameter {
    // Container id
    oneof container {
        // Required. Project ID.
        string project_id = 1;
        // Required. Folder ID.
        string folder_id = 2;
    }

    // Default value
    string default_workspace_id = 3;
}

// User-defined query parameter.
message QueryParameterCustomItem {
  // User defined value
  string value = 1;

  // User defined key
  string key = 2;
}

// Regex to search and replace in label values.
message RelabelItem {
  /**
   * Search regex
   */
  string find = 1;
  /**
   * Replace regex
   */
  string replace = 2;
}

// Monitoring source for QueryParameter.
message MonitoringQuerySource {
  // Required. Project id. Support interpolation by another parameter value.
  string project_id = 1;

  // Required. Selectors to select metric label values. Support interpolation by another parameter value.
  string selectors = 2;

  // Required. Label which is used to search values.
  string label_key = 3;
}

// Prometheus source for QueryParameter.
message PrometheusQuerySource {
  // Required. Selectors to select metric label values. Support interpolation by another parameter value.
  repeated string match = 1;

  // Required. Label which is used to search values.
  string label_key = 2;

  // Required. Workspace id which is used for search. Support interpolation by another parameter value.
  string workspace_id = 3;
}

// Query parameter.
message QueryParameter {
  // Is parameter multiselectable.
  bool multiselectable = 1;

  // Default value or comma-separated values
  repeated string default_values = 2;

  // List of user defined values
  repeated QueryParameterCustomItem custom_items = 3;

  // List of regex for search and replace in label values.
  repeated RelabelItem relabel_items = 4;

  // Query parameter datasource settings
  oneof data_source {
    // Monitoring source for QueryParameter.
    MonitoringQuerySource monitoring = 5;
    // Prometheus source for QueryParameter.
    PrometheusQuerySource prometheus = 6;
  }
}

// Parameter.
message Parameter {
  // Parameter identifier.
  string name = 1;

  // UI-visible title of the parameter.
  string title = 2;

  // Parameter data.
  oneof data {
    // Label values parameter.
    LabelValuesParameter label_values = 3 [deprecated = true];

    // Custom parameter.
    CustomParameter custom = 4;

    // Text parameter.
    TextParameter text = 5;

    // Integer parameter.
    IntegerParameter integer_parameter = 7;

    // Double parameter.
    DoubleParameter double_parameter = 8;

    // Integer parameter.
    TextValuesParameter text_values = 9;

    // Workspace parameter
    WorkspaceParameter workspace_parameter = 15;

    // Query parameter
    QueryParameter query = 16;
  }

  // UI-visibility.
  bool hidden = 6;

  // Parameter description.
  string description = 10;

  reserved 11 to 13;

  // Is parameter grouped.
  bool grouped = 14 [deprecated = true];
}

// Parametrization.
message Parametrization {
  // Parameters.
  repeated Parameter parameters = 1;

  // Predefined selectors.
  string selectors = 2 [deprecated = true];
}
