syntax = "proto3";

package yandex.cloud.baremetal.v1alpha;

import "yandex/cloud/baremetal/v1alpha/disk.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v1alpha;baremetal";
option java_package = "yandex.cloud.api.baremetal.v1alpha";

// CPU configuration.
message CPU {
  // Name of the CPU.
  string name = 1;

  // Vendor of the CPU.
  string vendor = 2;

  // @deprecated. Number of cores.
  int64 cores = 3 [deprecated = true];

  // Number of physical cores per CPU (socket).
  int64 physical_cores = 4;

  // Frequency of the CPU in megahertz (MHz).
  int64 frequency_mhz = 5 [(value) = ">0"];

  // Number of threads (logical cores) per CPU (socket).
  int64 threads = 6;
}

message DiskDriveConfiguration {
  // Type of the disk drive.
  DiskDriveType type = 1;

  // Number of disk drives.
  int64 disk_count = 2;

  // Size of a single disk drive in gibibytes (2^30 bytes).
  int64 disk_size_gib = 3;
}

message Configuration {
  reserved 7, 9 to 24;

  // ID of the configuration.
  string id = 1;

  // Name of the configuration.
  string name = 2;

  // Random-access memory (RAM) size in gibibytes (2^30 bytes).
  int64 memory_gib = 3;

  // CPU configuration.
  CPU cpu = 4;

  // Array of disk drive configurations.
  repeated DiskDriveConfiguration disk_drives = 5;

  // Network capacity or bandwidth in gigabits per second.
  int64 network_capacity_gbps = 6 [deprecated = true];

  // Number of cpu.
  int64 cpu_num = 8;

  // Network interfaces of the configuration.
  repeated ConfigurationNetworkInterface network_interfaces = 25;

  // Indicates whether the mounting option is available or not for this configuration.
  MountingAvailability mounting_availability = 26;
}

message ConfigurationNetworkInterface {
  // Id of the network interface
  // Not used while creating interfaces
  string id = 1;

  // Name of the network interface
  string name = 2;

  // Id of the configuration
  string configuration_id = 3;

  // Link speed in gigabits per second
  int64 link_speed_gbps = 4;

  // Available modes for the network interface
  repeated InterfaceMode available_modes = 5;

  // MC-LAG configuration options for aggregated interfaces
  MCLagAggregationOptions mc_lag_options = 6;

  // Mode of the network interface.
  enum InterfaceMode {
    // Unspecified interface mode.
    INTERFACE_MODE_UNSPECIFIED = 0;

    // Private network interface mode.
    PRIVATE = 1;

    // Public network interface mode.
    PUBLIC = 2;
  }

  // MC-LAG aggregation options for the network interface.
  message MCLagAggregationOptions {
    // Number of interfaces in the MC-LAG aggregation.
    int64 interface_count = 1;
  }
}

enum MountingAvailability {
  // Unspecified mounting availability.
  MOUNTING_AVAILABILITY_UNSPECIFIED = 0;

  // Mounting is available.
  AVAILABLE = 1;

  // Mounting is unavailable.
  UNAVAILABLE = 2;
}
