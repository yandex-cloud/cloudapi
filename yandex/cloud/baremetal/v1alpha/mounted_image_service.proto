syntax = "proto3";

package yandex.cloud.baremetal.v1alpha;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v1alpha;baremetal";
option java_package = "yandex.cloud.api.baremetal.v1alpha";

// A set of methods for managing Image mounting.
service MountedImageService {
  // Mount user image.
  rpc Create(CreateMountedImageRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      body: "*"
      post: "/baremetal/v1alpha/mountedImages"
    };
  };

  // Unmount user image.
  rpc Delete(DeleteMountedImageRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/baremetal/v1alpha/mountedImages/{server_id}"
    };
  };

  // Get mounted user image.
  rpc Get(GetMountedImageRequest) returns (GetMountedImageResponse) {
    option (google.api.http) = {
      get: "/baremetal/v1alpha/mountedImages/{server_id}"
    };
  };
}

message CreateMountedImageRequest {
  // ID of the server to mount image to.
  string server_id = 1 [(required) = true];

  // ID of the image to mount.
  string image_id = 2 [(required) = true];
}

message DeleteMountedImageRequest {
  // ID of the server to unmount image from.
  string server_id = 1 [(required) = true];
}

message GetMountedImageRequest {
  // ID of the server to get mounted image from.
  string server_id = 1 [(required) = true];
}

message GetMountedImageResponse {
  reserved 2;

  // ID of the image that is mounted.
  string image_id = 1;

  // When mounted image expires.
  google.protobuf.Timestamp expires_at = 3;
}
