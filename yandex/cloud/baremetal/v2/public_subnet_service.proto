// A set of methods for managing PublicSubnet resources.
service PublicSubnetService {
  // Returns the specific PublicSubnet resource.
  //
  // To get the list of available PublicSubnet resources, make a [List] request.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc GetPublicSubnet(GetPublicSubnetRequest) returns (PublicSubnet) {
    option (google.api.http) = {
      get: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/publicSubnets/{public_subnet_id}"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,public_subnet_id";
  };

  // Retrieves the list of PublicSubnet resources in the specified folder.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc ListPublicSubnets(ListPublicSubnetsRequest) returns (ListPublicSubnetsResponse) {
    option (google.api.http) = {
      get: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/publicSubnets"
    };
    option (google.api.method_signature) = "cloud_id,folder_id";
  };

  // Creates a public subnet in the specified folder.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc CreatePublicSubnet(CreatePublicSubnetRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "CreatePublicSubnetMetadata"
      response: "PublicSubnet"
    };
    option (google.api.http) = {
      body: "public_subnet"
      post: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/publicSubnets"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,public_subnet";
  };

  // Updates the specified public subnet.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc UpdatePublicSubnet(UpdatePublicSubnetRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "UpdatePublicSubnetMetadata"
      response: "PublicSubnet"
    };
    option (google.api.http) = {
      body: "public_subnet"
      patch: "/baremetal/v2/clouds/{public_subnet.cloud_id}/folders/{public_subnet.folder_id}/publicSubnets/{public_subnet.public_subnet_id}"
    };
    option (google.api.method_signature) = "public_subnet,update_mask";
  };

  // Deletes the specified public subnet.
  //
  // Deleting a public subnet removes its data permanently and is irreversible.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc DeletePublicSubnet(DeletePublicSubnetRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "DeletePublicSubnetMetadata"
      response: "google.protobuf.Empty"
    };
    option (google.api.http) = {
      delete: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/publicSubnets/{public_subnet_id}"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,public_subnet_id";
  };

}

