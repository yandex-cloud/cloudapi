syntax = "proto3";

package yandex.cloud.baremetal.v2;

import "google/api/field_behavior.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2";

// DHCP options for a subnet.
message DhcpOptions {
  // Start IP address of the DHCP range (inclusive).
  string start_ip = 1 [(google.api.field_behavior) = REQUIRED];

  // End IP address of the DHCP range (inclusive).
  string end_ip = 2 [(google.api.field_behavior) = REQUIRED];
}
