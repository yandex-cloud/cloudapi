syntax = "proto3";

package yandex.cloud.baremetal.v2;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2";

// OperationMetadata contains additional metadata for a baremetal operation
// that is not present in the standard google.longrunning.Operation.
// It wraps the operation-specific metadata and adds YC-specific fields.
message OperationMetadata {
  // Human-readable description of the operation.
  string description = 1;

  // The time the operation was created.
  google.protobuf.Timestamp created_at = 2;

  // ID of the user or service account who initiated the operation.
  string created_by = 3;

  // The time the operation was last modified.
  google.protobuf.Timestamp modified_at = 4;
}
