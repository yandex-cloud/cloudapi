syntax = "proto3";

package yandex.cloud.baremetal.v2;

import "yandex/cloud/baremetal/v2/disk.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2";

// Storage partition type.
enum StoragePartitionType {
  // Unspecified storage partition type.
  STORAGE_PARTITION_TYPE_UNSPECIFIED = 0;

  // ext4 file system partition type.
  EXT4 = 1;

  // Swap partition type.
  SWAP = 2;

  // ext3 file system partition type.
  EXT3 = 3;

  // XFS file system partition type.
  XFS = 4;
}

message StoragePartition {
  // Partition type.
  StoragePartitionType type = 1;

  // Size of the storage partition.
  int64 size_bytes = 2;

  // Storage mount point.
  string mount_point = 3;
}

// RaidType represents different RAID configurations.
enum RaidType {
  // Unspecified RAID configuration.
  RAID_TYPE_UNSPECIFIED = 0;

  // RAID0 configuration.
  RAID0 = 1;

  // RAID1 configuration.
  RAID1 = 2;

  // RAID10 configuration.
  RAID10 = 3;
}

// Storage, a OS-level storage entity used for creating partitions. For example, this could
// represent a plain disk or a software RAID of disks.
message Storage {
  // Array of partitions created on the storage.
  repeated StoragePartition partitions = 1;
  // Storage type.
  oneof storage_type {
    option (exactly_one) = true;

    // Disk storage.
    Disk disk = 2;

    // RAID storage.
    Raid raid = 3;
  }
}

// RAID storage.
message Raid {
  // RAID type.
  RaidType type = 1;

  // Array of disks in the RAID configuration.
  repeated Disk disks = 2;
}
