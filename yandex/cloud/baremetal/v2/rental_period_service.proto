syntax = "proto3";

package yandex.cloud.baremetal.v2;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "yandex/cloud/baremetal/v2/rental_period.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2";

// A set of methods to retrieve information about RentalPeriod resources.
service RentalPeriodService {
  // Retrieves the list of RentalPeriod resources.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc ListRentalPeriods(ListRentalPeriodsRequest) returns (ListRentalPeriodsResponse) {
    option (google.api.http) = {
      get: "/baremetal/v2/rentalPeriods"
    };
  };
}

message ListRentalPeriodsRequest {
  // The maximum number of results per page to return. If the number of available
  // results is greater than `page_size`,
  // the service returns a [ListRentalPeriodsResponse.next_page_token]
  // that can be used to get the next page of results in subsequent list requests.
  // Default value is 20.
  int64 page_size = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (value) = "<=1000"
  ];

  // Page token. To get the next page of results, set `page_token` to the
  // [ListRentalPeriodsResponse.next_page_token] returned by a previous list request.
  string page_token = 2 [(google.api.field_behavior) = OPTIONAL];
}

message ListRentalPeriodsResponse {
  // List of RentalPeriod resources.
  repeated RentalPeriod rental_periods = 1;

  // Token for getting the next page of the list. If the number of results is greater than
  // [ListZonesRequest.page_size], use `next_page_token` as the value
  // for the [ListRentalPeriodsResponse.page_token] parameter in the next list request.
  //
  // Each subsequent page will have its own `next_page_token` to continue paging through the results.
  string next_page_token = 2;
}
