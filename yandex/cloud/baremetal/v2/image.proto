syntax = "proto3";

package yandex.cloud.baremetal.v2;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2";

// An Image resource.
message Image {
  reserved 4, 8 to 9;

  // Image status.
  enum Status {
    // Unspecified image status.
    STATUS_UNSPECIFIED = 0;

    // Image is published and available to users.
    PUBLISHED = 3;

    // Image is disabled for new installations but preserved for existing servers.
    DISABLED = 4;
  }

  // ID of the image.
  string image_id = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // ID of the folder that the image belongs to.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // Name of the image
  string name = 3 [(google.api.field_behavior) = REQUIRED];

  // Family of the image
  string family = 5 [(google.api.field_behavior) = REQUIRED];

  // State of the image.
  Status state = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Timestamp when the image was published.
  google.protobuf.Timestamp publish_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // ID of the cloud that the image belongs to.
  string cloud_id = 10 [(google.api.field_behavior) = REQUIRED];
}
