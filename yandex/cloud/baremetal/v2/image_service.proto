syntax = "proto3";

package yandex.cloud.baremetal.v2;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "yandex/cloud/baremetal/v2/image.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2";

// A set of methods to retrieve information about image.
service ImageService {
  // Returns the specific Image resource.
  // To get the list of resources, make a [ListImages] request.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc GetImage(GetImageRequest) returns (Image) {
    option (google.api.http) = {
      get: "/baremetal/v2/folders/{folder_id}/images/{image_id}"
    };
    option (google.api.method_signature) = "image_id";
  };

  // Retrieves the list of Image resources.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse) {
    option (google.api.http) = {
      get: "/baremetal/v2/folders/{folder_id}/images"
    };
  };
}

message GetImageRequest {
  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the Image resource to return.
  // To get the image ID, use a [ImageService.ListImages] request.
  string image_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (length) = "<=20"
  ];
}

message ListImagesRequest {
  // ID of the parent folder. "baremetal-standard-images" folder contains general images and used by default
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 1 [(google.api.field_behavior) = OPTIONAL];

  // The maximum number of results per page to return. If the number of available
  // results is greater than `page_size`,
  // the service returns a [ListImagesResponse.next_page_token]
  // that can be used to get the next page of results in subsequent list requests.
  // Default value is 20.
  int64 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (value) = "<=1000"
  ];

  // Page token. To get the next page of results, set `page_token` to the
  // [ListImagesResponse.next_page_token] returned by a previous list request.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Sorting order for the listing. Follows the [AIP-132](https://google.aip.dev/132) `order_by` format:
  // `"field [asc|desc]"`, e.g. `"createTime desc"`.
  //
  // Supported fields: `imageId`, `createTime`.
  // Default order: `imageId asc`.
  string order_by = 4;

  // Filter expression following [AIP-160](https://google.aip.dev/160).
  //
  // Supported fields and operators:
  // - `imageId`, `name` - `=`, `!=`, `:` (contains)
  //
  // Example: `name : "ubuntu"`.
  string filter = 5;
}

message ListImagesResponse {
  // List of StandardImage resources.
  repeated Image images = 1;

  // Token for getting the next page of the list. If the number of results is greater than
  // [ListImagesRequest.page_size], use `next_page_token` as the value
  // for the [ListImagesRequest.page_token] parameter in the next list request.
  // Each subsequent page will have its own `next_page_token` to continue paging through the results.
  string next_page_token = 2;
}
