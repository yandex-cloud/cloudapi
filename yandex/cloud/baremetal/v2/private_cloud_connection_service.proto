syntax = "proto3";

package yandex.cloud.baremetal.v2;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/field_mask.proto";
import "yandex/cloud/api/operation.proto";
import "yandex/cloud/baremetal/v2/operation.proto";
import "yandex/cloud/baremetal/v2/private_cloud_connection.proto";
import "yandex/cloud/operation/operation.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2";

// A set of methods for managing Private cloud connection resources.
service PrivateCloudConnectionService {
  // Returns the specific Private cloud connection resource.
  // To get the list of available Private cloud connection resources, make a [List] request.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc GetPrivateCloudConnection(GetPrivateCloudConnectionRequest) returns (PrivateCloudConnection) {
    option (google.api.http) = {
      get: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/privateCloudConnections/{private_cloud_connection_id}"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,private_cloud_connection_id";
  };

  // Retrieves the list of Private cloud connection resources in the specified folder.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc ListPrivateCloudConnections(ListPrivateCloudConnectionsRequest) returns (ListPrivateCloudConnectionsResponse) {
    option (google.api.http) = {
      get: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/privateCloudConnections"
    };
    option (google.api.method_signature) = "cloud_id,folder_id";
  };

  // Creates a private cloud connection in the specified folder.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc Create(CreatePrivateCloudConnectionRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "CreatePrivateCloudConnectionMetadata"
      response: "PrivateCloudConnection"
    };
    option (google.api.http) = {
      body: "private_cloud_connection"
      post: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/privateCloudConnections"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,private_cloud_connection";
  };

  // Updates the routing_instance_id in a private cloud connection.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc UpdatePrivateCloudConnection(UpdatePrivateCloudConnectionRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "UpdatePrivateCloudConnectionMetadata"
      response: "PrivateCloudConnection"
    };
    option (google.api.http) = {
      body: "private_cloud_connection"
      patch: "/baremetal/v2/clouds/{private_cloud_connection.cloud_id}/folders/{private_cloud_connection.folder_id}/privateCloudConnections/{private_cloud_connection.private_cloud_connection_id}"
    };
    option (google.api.method_signature) = "private_cloud_connection";
  };

  // Removes a private cloud connection and all allocated network resouces.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc DeletePrivateCloudConnection(DeletePrivateCloudConnectionRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "DeletePrivateCloudConnectionMetadata"
      response: "google.protobuf.Empty"
    };
    option (google.api.http) = {
      delete: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/privateCloudConnections/{private_cloud_connection_id}"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,private_cloud_connection_id";
  };

}

message GetPrivateCloudConnectionRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // ID of the Private cloud connection resource to return.
  // To get the server ID, use a [PrivateCloudConnectionService.List] request.
  string private_cloud_connection_id = 3 [
    (google.api.field_behavior) = REQUIRED,
    (length) = "<=20",
    (pattern) = "[a-z][a-z0-9.-]*"
  ];
}

message ListPrivateCloudConnectionsRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the folder to list private cloud connections in.
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (length) = "<=50",
    (pattern) = "[a-z][a-z0-9.-]*"
  ];

  // The maximum number of results per page to return. If the number of available
  // results is greater than `page_size`,
  // the service returns a [ListPrivateCloudConnectionResponse.next_page_token]
  // that can be used to get the next page of results in subsequent list requests.
  // Default value is 20.
  int64 page_size = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (value) = "<=100"
  ];

  // Page token. To get the next page of results, set `page_token` to the
  // [ListPrivateCloudConnectionResponse.next_page_token] returned by a previous list request.
  string page_token = 4 [(google.api.field_behavior) = OPTIONAL];

  // Sorting order for the listing. Follows the [AIP-132](https://google.aip.dev/132) `order_by` format:
  // `"field [asc|desc]"`, e.g. `"createTime desc"`.
  //
  // Supported fields: `privateCloudConnectionId`, `createTime`, `updateTime`.
  // Default order: `privateCloudConnectionId asc`.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Filter expression following [AIP-160](https://google.aip.dev/160).
  //
  // Supported fields and operators:
  // - `privateCloudConnectionId`, `name`, `vrfId`, `routingInstanceId` - `=`, `!=`, `:` (contains)
  // - `state` - `=`, `!=`
  //
  // Example: `state = "ACTIVE" AND vrfId = "enp1234abcd"`.
  string filter = 6 [(google.api.field_behavior) = OPTIONAL];
}

message ListPrivateCloudConnectionsResponse {
  // List of Private cloud connection resources.
  repeated PrivateCloudConnection private_cloud_connections = 1;

  // Token for getting the next page of the list. If the number of results is greater than
  // [ListPrivateCloudConnectionRequest.page_size], use `next_page_token` as the value
  // for the [ListPrivateCloudConnectionRequest.page_token] parameter in the next list request.
  // Each subsequent page will have its own `next_page_token` to continue paging through the results.
  string next_page_token = 2;
}

message CreatePrivateCloudConnectionRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The private cloud connection to create.
  PrivateCloudConnection private_cloud_connection = 3 [(google.api.field_behavior) = REQUIRED];
}

message UpdatePrivateCloudConnectionRequest {
  // The private cloud connection object to be updated.
  PrivateCloudConnection private_cloud_connection = 1 [(google.api.field_behavior) = REQUIRED];

  // Field mask that specifies which fields of the PrivateCloudConnection resource are going to be updated.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

message DeletePrivateCloudConnectionRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // ID of the private cloud connection to delete.
  // To get the private cloud connection ID, use a [PrivateCloudConnectionService.List] request.
  string private_cloud_connection_id = 3 [
    (google.api.field_behavior) = REQUIRED,
    (length) = "<=20",
    (pattern) = "[a-z][a-z0-9.-]*"
  ];
}

message RestorePrivateCloudConnectionMetadata {
  // ID of the Private cloud connection resource that is being restored.
  string private_cloud_connection_id = 1;

  // Common operation metadata
  OperationMetadata operation_metadata = 2;
}

message CreatePrivateCloudConnectionMetadata {
  // ID of the private cloud connection that is being created.
  string private_cloud_connection_id = 1;

  // Common operation metadata
  OperationMetadata operation_metadata = 2;
}

message UpdatePrivateCloudConnectionMetadata {
  // ID of the Private cloud connection resource that is being update.
  string private_cloud_connection_id = 1;

  // Common operation metadata
  OperationMetadata operation_metadata = 2;
}

message DeletePrivateCloudConnectionMetadata {
  // ID of the Private cloud connection resource that is being deleted.
  string private_cloud_connection_id = 1;

  // Common operation metadata
  OperationMetadata operation_metadata = 2;
}
