syntax = "proto3";

package yandex.cloud.baremetal.v2;

import "google/api/field_behavior.proto";
import "yandex/cloud/baremetal/v2/configuration.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2";

// CPU configuration.
message UserCPU {
  // ID of the CPU from configurator.
  string id = 1 [(google.api.field_behavior) = INPUT_ONLY];

  // Name of the CPU.
  string name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Vendor of the CPU.
  string vendor = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Number of physical cores per CPU (socket).
  int64 physical_cores = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Frequency of the CPU in megahertz (MHz).
  int64 frequency_mhz = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Number of cpu.
  int64 count = 6 [(google.api.field_behavior) = REQUIRED];

  // Number of threads (logical cores) per CPU (socket).
  int64 threads = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message UserRAM {
  reserved 2;

  // ID of the RAM from configurator.
  string id = 1 [
    (google.api.field_behavior) = INPUT_ONLY,
    (google.api.field_behavior) = REQUIRED
  ];

  // Ram size.
  int64 size_bytes = 3 [(google.api.field_behavior) = REQUIRED];
}

message UserNIC {
}

message UserPool {
}

message UserConfiguration {
  // ID of the configuration.
  string configuration_id = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Name of the configuration.
  string name = 2 [(google.api.field_behavior) = REQUIRED];

  // CPU configuration.
  UserCPU cpu = 3 [(google.api.field_behavior) = REQUIRED];

  // Array of disk drive configurations.
  repeated DiskDriveConfiguration disk_drives = 4 [(google.api.field_behavior) = REQUIRED];

  // Random-access memory (RAM).
  UserRAM ram = 5 [(google.api.field_behavior) = REQUIRED];
}
