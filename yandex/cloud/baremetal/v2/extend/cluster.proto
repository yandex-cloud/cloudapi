syntax = "proto3";

package yandex.cloud.baremetal.v2.extend;

import "google/api/field_behavior.proto";
import "yandex/cloud/baremetal/v2/server.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2/extend;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2.extend";

message BastionSpec {
  // Root user SSH key.
  //
  // Input only field. One of elements is required.
  oneof ssh_key {
    option (exactly_one) = true;

    // Public SSH key for the server.
    //
    // Input only field.
    string ssh_public_key_text = 1 [
      (google.api.field_behavior) = INPUT_ONLY,
      (length) = "<=20000"
    ];

    // ID of the user SSH key to use for the server.
    //
    // Input only field. To get the user SSH key ID, use a [yandex.cloud.organizationmanager.v1.UserSshKeyService.List] request.
    string user_ssh_id = 2 [
      (google.api.field_behavior) = INPUT_ONLY,
      (length) = "<=50"
    ];
  }

  // Password for the server.
  //
  // Input only field. One of elements is required.
  oneof password {
    option (exactly_one) = true;

    // Raw password.
    //
    // Input only field.
    string password_plain_text = 3 [
      (google.api.field_behavior) = INPUT_ONLY,
      (length) = ">=6"
    ];

    // Reference to the Lockbox secret used to obtain the password.
    //
    // Input only field.
    LockboxSecret password_lockbox_secret = 4 [(google.api.field_behavior) = INPUT_ONLY];
  }
}
