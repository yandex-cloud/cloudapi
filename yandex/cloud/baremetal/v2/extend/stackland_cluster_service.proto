syntax = "proto3";

package yandex.cloud.baremetal.v2.extend;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/field_mask.proto";
import "yandex/cloud/api/operation.proto";
import "yandex/cloud/baremetal/v2/extend/stackland_cluster.proto";
import "yandex/cloud/baremetal/v2/operation.proto";
import "yandex/cloud/operation/operation.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2/extend;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2.extend";

// A set of methods for managing StacklandCluster resources.
service StacklandClusterService {
  // Gets Stackland cluster by it's id.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc GetStacklandCluster(GetStacklandClusterRequest) returns (StacklandCluster) {
    option (google.api.http) = {
      get: "/v2/clouds/{cloud_id}/folders/{folder_id}/extend/stacklandClusters/{stackland_cluster_id}"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,stackland_cluster_id";
  };

  // List Stackland clusters in the specified folder.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc ListStacklandClusters(ListStacklandClustersRequest) returns (ListStacklandClustersResponse) {
    option (google.api.http) = {
      get: "/v2/clouds/{cloud_id}/folders/{folder_id}/extend/stacklandClusters"
    };
    option (google.api.method_signature) = "cloud_id,folder_id";
  };

  // Creates new Stackland cluster.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc CreateStacklandCluster(CreateStacklandClusterRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "CreateStacklandClusterMetadata"
      response: "StacklandCluster"
    };
    option (google.api.http) = {
      body: "cluster"
      post: "/v2/clouds/{cloud_id}/folders/{folder_id}/extend/stacklandClusters"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,cluster";
  };

  // Updates the specified Stackland cluster.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc UpdateStacklandCluster(UpdateStacklandClusterRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "UpdateStacklandClusterMetadata"
      response: "StacklandCluster"
    };
    option (google.api.http) = {
      body: "cluster"
      patch: "/v2/clouds/{cluster.cloud_id}/folders/{cluster.folder_id}/extend/stacklandClusters/{cluster.stackland_cluster_id}"
    };
    option (google.api.method_signature) = "cluster,update_mask";
  };

  // Deletes the specified Stackland cluster.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc DeleteStacklandCluster(DeleteStacklandClusterRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "DeleteStacklandClusterMetadata"
      response: "google.protobuf.Empty"
    };
    option (google.api.http) = {
      delete: "/v2/clouds/{cloud_id}/folders/{folder_id}/extend/stacklandClusters/{stackland_cluster_id}"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,stackland_cluster_id";
  };

}

message GetStacklandClusterRequest {
  // ID of the parent cloud.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // ID of the cluster to retrieve.
  string stackland_cluster_id = 3 [(google.api.field_behavior) = REQUIRED];
}

message ListStacklandClustersRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The maximum number of results per page to return. If the number of available
  // results is greater than `page_size`,
  // the service returns a [ListStacklandClustersResponse.next_page_token]
  // that can be used to get the next page of results in subsequent list requests.
  // Default value is 20.
  int64 page_size = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (value) = "<=1000"
  ];

  // Page token. To get the next page of results, set `page_token` to the
  // [ListStacklandClustersResponse.next_page_token] returned by a previous list request.
  string page_token = 4 [(google.api.field_behavior) = OPTIONAL];

  // By which column the listing should be ordered and in which direction.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // A filter expression that filters resources listed in the response.
  string filter = 6 [(google.api.field_behavior) = OPTIONAL];
}

message ListStacklandClustersResponse {
  reserved 2 to 99;

  // List of Cluster resources.
  repeated StacklandCluster clusters = 1;

  // Token for getting the next page of the list. If the number of results is greater than
  // [ListStacklandClustersRequest.page_size], use `next_page_token` as the value
  // for the [ListStacklandClustersRequest.page_token] parameter in the next list request.
  //
  // Each subsequent page will have its own `next_page_token` to continue paging through the results.
  string next_page_token = 100;
}

message CreateStacklandClusterMetadata {
  // ID of the cluster that is being created.
  string stackland_cluster_id = 1;

  // Common operation metadata.
  OperationMetadata operation_metadata = 2;
}

message CreateStacklandClusterRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The cluster to create.
  StacklandCluster cluster = 3 [(google.api.field_behavior) = REQUIRED];
}

message UpdateStacklandClusterRequest {
  // The cluster object to be updated
  StacklandCluster cluster = 1 [(google.api.field_behavior) = REQUIRED];

  // Field mask that specifies which fields of the StacklandCluster resource are going to be updated.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

message UpdateStacklandClusterMetadata {
  // ID of the StacklandCluster resource that is being updated.
  string stackland_cluster_id = 1;

  // Common operation metadata
  OperationMetadata operation_metadata = 2;
}

message DeleteStacklandClusterRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // ID of the cluster to delete.
  //
  // To get the cluster ID, use a [StacklandClusterService.List] request.
  string stackland_cluster_id = 3 [
    (google.api.field_behavior) = REQUIRED,
    (length) = "20",
    (pattern) = "[a-z][a-z0-9]*"
  ];
}

message DeleteStacklandClusterMetadata {
  // ID of the StacklandCluster resource that is being deleted.
  string stackland_cluster_id = 1;

  // Common operation metadata
  OperationMetadata operation_metadata = 2;
}
