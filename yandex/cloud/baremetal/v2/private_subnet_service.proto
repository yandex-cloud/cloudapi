      get: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/privateSubnets"
    };
    option (google.api.method_signature) = "cloud_id,folder_id";
  };

  // Creates a private subnet in the specified folder.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc CreatePrivateSubnet(CreatePrivateSubnetRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "CreatePrivateSubnetMetadata"
      response: "PrivateSubnet"
    };
    option (google.api.http) = {
      body: "*"
      post: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/privateSubnets"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,private_subnet";
  };

  // Updates the specified private subnet.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc UpdatePrivateSubnet(UpdatePrivateSubnetRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "UpdatePrivateSubnetMetadata"
      response: "PrivateSubnet"
    };
    option (google.api.http) = {
      body: "private_subnet"
      patch: "/baremetal/v2/clouds/{private_subnet.cloud_id}/folders/{private_subnet.folder_id}/privateSubnets/{private_subnet.private_subnet_id}"
    };
    option (google.api.method_signature) = "private_subnet,update_mask";
  };

  // Deletes the specified private subnet.
  //
  // Deleting a private subnet removes its data permanently and is irreversible.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc DeletePrivateSubnet(DeletePrivateSubnetRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "DeletePrivateSubnetMetadata"
      response: "google.protobuf.Empty"
    };
    option (google.api.http) = {
      delete: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/privateSubnets/{private_subnet_id}"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,private_subnet_id";
  };

}

