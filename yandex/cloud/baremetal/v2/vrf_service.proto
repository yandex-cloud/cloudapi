syntax = "proto3";

package yandex.cloud.baremetal.v2;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/field_mask.proto";
import "yandex/cloud/api/operation.proto";
import "yandex/cloud/baremetal/v2/vrf.proto";
import "yandex/cloud/operation/operation.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/baremetal/v2;baremetal";
option java_package = "yandex.cloud.api.api.baremetal.v2";

// A set of methods for managing VRF resources.
service VrfService {
  // Returns the specific VRF resource.
  //
  // To get the list of available VRFs, make a [List] request.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc GetVrf(GetVrfRequest) returns (Vrf) {
    option (google.api.http) = {
      get: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/vrfs/{vrf_id}"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,vrf_id";
  };

  // Retrieves the list of VRF resources in the specified folder.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc ListVrfs(ListVrfsRequest) returns (ListVrfsResponse) {
    option (google.api.http) = {
      get: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/vrfs"
    };
    option (google.api.method_signature) = "cloud_id,folder_id";
  };

  // Creates a VRF in the specified folder.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc CreateVrf(CreateVrfRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "CreateVrfMetadata"
      response: "Vrf"
    };
    option (google.api.http) = {
      body: "vrf"
      post: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/vrfs"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,vrf";
  };

  // Updates the specified VRF resource.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc UpdateVrf(UpdateVrfRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "UpdateVrfMetadata"
      response: "Vrf"
    };
    option (google.api.http) = {
      body: "vrf"
      patch: "/baremetal/v2/clouds/{vrf.cloud_id}/folders/{vrf.folder_id}/vrfs/{vrf.vrf_id}"
    };
    option (google.api.method_signature) = "vrf,update_mask";
  };

  // Deletes the specified VRF resource.
  //
  // Deleting a VRF removes its data permanently and is irreversible.
  // The VRF must not have any associated PrivateSubnet resources.
  // Delete all private subnets before deleting the VRF, otherwise
  // the request will fail with INVALID_ARGUMENT error.
  // (-- api-linter: yc::1702::method-no-resource=disabled
  // https://google.aip.dev/130 --)
  rpc DeleteVrf(DeleteVrfRequest) returns (operation.Operation) {
    option (api.operation) = {
      metadata: "DeleteVrfMetadata"
      response: "google.protobuf.Empty"
    };
    option (google.api.http) = {
      delete: "/baremetal/v2/clouds/{cloud_id}/folders/{folder_id}/vrfs/{vrf_id}"
    };
    option (google.api.method_signature) = "cloud_id,folder_id,vrf_id";
  };

}

message GetVrfRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // ID of the VRF to return.
  //
  // To get the VRF ID, use a [VrfService.List] request.
  string vrf_id = 3 [
    (google.api.field_behavior) = REQUIRED,
    (length) = "20",
    (pattern) = "[a-z][a-z0-9]*"
  ];
}

message ListVrfsRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The maximum number of results per page to return. If the number of available
  // results is greater than `page_size`,
  // the service returns a [ListVrfsResponse.next_page_token]
  // that can be used to get the next page of results in subsequent list requests.
  // Default value is 20.
  int64 page_size = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (value) = "<=1000"
  ];

  // Page token. To get the next page of results, set `page_token` to the
  // [ListVrfsResponse.next_page_token] returned by a previous list request.
  string page_token = 4 [(google.api.field_behavior) = OPTIONAL];

  // Sorting order for the listing. Follows the [AIP-132](https://google.aip.dev/132) `order_by` format:
  // `"field [asc|desc]"`, e.g. `"createTime desc"`.
  //
  // Supported fields: `vrfId`, `createTime`, `updateTime`.
  // Default order: `vrfId asc`.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Filter expression following [AIP-160](https://google.aip.dev/160).
  //
  // Supported fields and operators:
  // - `vrfId`, `name` - `=`, `!=`, `:` (contains)
  //
  // Example: `name : "prod"`.
  string filter = 6 [(google.api.field_behavior) = OPTIONAL];
}

message ListVrfsResponse {
  // List of VRF resources.
  repeated Vrf vrfs = 1;

  // Token for getting the next page of the list. If the number of results is greater than
  // [ListVrfRequest.page_size], use `next_page_token` as the value
  // for the [ListVrfRequest.page_token] parameter in the next list request.
  //
  // Each subsequent page will have its own `next_page_token` to continue paging through the results.
  string next_page_token = 2;
}

// Request for creating vrf
message CreateVrfRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The vrf to create.
  Vrf vrf = 3 [(google.api.field_behavior) = REQUIRED];
}

message CreateVrfMetadata {
  // ID of the VRF that is being created.
  string vrf_id = 1;
}

message UpdateVrfRequest {
  // The vrf object to be updated.
  Vrf vrf = 1 [(google.api.field_behavior) = REQUIRED];

  // Fields to update.
  // [google.protobuf.FieldMask][google.protobuf.FieldMask]. Updatable fields:
  //
  // * `name`
  // * `description`
  // * `static_routes`
  // * `labels`
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

message UpdateVrfMetadata {
  // ID of the VRF that is being updated.
  string vrf_id = 1;
}

message DeleteVrfRequest {
  // ID of the parent cloud.
  //
  // To get the cloud ID, use a [yandex.cloud.resourcemanager.v1.CloudService.List] request.
  string cloud_id = 1 [(google.api.field_behavior) = REQUIRED];

  // ID of the parent folder.
  //
  // To get the folder ID, use a [yandex.cloud.resourcemanager.v1.FolderService.List] request.
  string folder_id = 2 [(google.api.field_behavior) = REQUIRED];

  // ID of the VRF to delete.
  //
  // To get the VRF ID, use a [VrfService.List] request.
  string vrf_id = 3 [
    (google.api.field_behavior) = REQUIRED,
    (length) = "20",
    (pattern) = "[a-z][a-z0-9]*"
  ];
}

message DeleteVrfMetadata {
  // ID of the VRF resource that is being deleted.
  string vrf_id = 1;
}
