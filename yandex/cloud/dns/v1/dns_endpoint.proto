syntax = "proto3";

package yandex.cloud.dns.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/dns/v1;dns";
option java_package = "yandex.cloud.api.dns.v1";

message DnsInboundEndpoint {
  // ID of the DNS inbound endpoint. Generated at creation time.
  string id = 1;

  // ID of the folder that the DNS inbound endpoint belongs to.
  string folder_id = 2;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 3;

  // Name of the DNS inbound endpoint.
  // The name is unique within the folder.
  string name = 4;

  // Description of the DNS inbound endpoint.
  string description = 5;

  // DNS inbound endpoint labels as `key:value` pairs.
  map<string, string> labels = 6;

  // ID of the network that the DNS inbound endpoint belongs to.
  string network_id = 7;

  // IP address of the DNS inbound endpoint.
  string address = 8;

  // ID of the address resource.
  string address_id = 9;

  // Status of the DNS inbound endpoint.
  Status status = 10;

  // Prevents accidental endpoint removal.
  bool deletion_protection = 11;
  enum Status {
    // Status is not specified.
    STATUS_UNSPECIFIED = 0;

    // Endpoint is being created.
    PENDING = 1;

    // Endpoint is ready to use.
    AVAILABLE = 2;

    // Endpoint is being deleted.
    DELETING = 3;
  }
}
