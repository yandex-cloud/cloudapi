syntax = "proto3";

package yandex.cloud.iam.v1;

import "google/protobuf/field_mask.proto";
import "yandex/cloud/iam/subject.proto";
import "yandex/cloud/iam/v1/resource.proto";
import "yandex/cloud/validation.proto";

option go_package = "github.com/yandex-cloud/go-genproto/yandex/cloud/iam/v1;iam";
option java_package = "yandex.cloud.api.iam.v1";

service SubjectDetailsService {
  // Returns the details of the specified subject.
  rpc Get(GetSubjectRequest) returns (GetSubjectResponse);

  // Retrieves the list of subjects that have access to the specified organization or folder.
  rpc List(ListSubjectsRequest) returns (ListSubjectsResponse);

  // Returns the details of multiple subjects by their IDs.
  rpc BatchGet(BatchGetSubjectsRequest) returns (BatchGetSubjectsResponse);
}

message GetSubjectRequest {
  reserved 2;

  // ID of the subject to return.
  string subject_id = 1 [
    (length) = "<=100",
    (required) = true
  ];

  // A mask that specifies which fields of the subject to return.
  google.protobuf.FieldMask field_mask = 3;

  // The resource to which the returned subject has access. Can only be an organization or a folder.
  Resource resource_context = 4;
}

message GetSubjectResponse {
  // The requested subject.
  Subject subject = 1;
}

message ListSubjectsRequest {
  reserved 3;

  // The resource to which returned subjects have access. Can only be an organization or a folder.
  Resource resource_context = 1 [(required) = true];

  // A filter expression in CEL (Common Expression Language) that filters subjects listed in the response.
  string filter = 2 [(length) = "<=10000"];

  // The maximum number of subjects to return per response
  int64 page_size = 4 [(value) = "<=1000"];

  // Page token
  string page_token = 5 [(length) = "<=2000"];

  // A mask that specifies which fields of the subjects to return
  google.protobuf.FieldMask field_mask = 6;
}

message ListSubjectsResponse {
  // List of subjects.
  repeated Subject subjects = 1;

  // Token for getting the next page of results
  string next_page_token = 2;
}

message BatchGetSubjectsRequest {
  reserved 2;

  // IDs of the subjects to return.
  repeated string subject_ids = 1 [(size) = "1-1000"];

  // A filter expression in CEL (Common Expression Language) that filters the subjects listed in the response.
  string filter = 3 [(length) = "<=10000"];

  // A mask that specifies which fields of the subjects to return.
  google.protobuf.FieldMask field_mask = 4;

  // The resource to which the returned subjects have access. Can only be an organization or a folder.
  Resource resource_context = 5;
}

message BatchGetSubjectsResponse {
  // List of the requested subjects.
  repeated Subject subjects = 1;
}
